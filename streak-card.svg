<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff2200;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff2200;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect width="900" height="200" rx="12"/>
    </clipPath>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bgGrad)"/>
  <rect width="900" height="200" rx="12" fill="none" stroke="#ff2200" stroke-width="1.5" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="898" height="198" rx="11" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <line x1="300" y1="30" x2="300" y2="185" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="600" y1="30" x2="600" y2="185" stroke="#1a1a1a" stroke-width="1"/>

  <!-- LEFT — Total Contributions -->
  <text x="150" y="162" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="11" fill="#444444" letter-spacing="2">TOTAL CONTRIBUTIONS</text>
  <text x="150" y="176" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="10" fill="#333333" letter-spacing="1">May 4 – Present</text>
  <text x="150" y="120" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="52" font-weight="bold" fill="#ffffff" opacity="0">
    66
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.3;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- CENTER — Current Streak -->
  <text x="450" y="38" text-anchor="middle" font-size="32">
    🔥
    <animate attributeName="opacity" values="1;0.4;1;0.7;1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </text>
  <circle cx="450" cy="105" r="55" fill="url(#ringGlow)">
    <animate attributeName="r" values="50;62;50" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="105" r="44" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <circle cx="450" cy="105" r="44" fill="none" stroke="#ff2200" stroke-width="4"
    stroke-dasharray="276" stroke-dashoffset="276" stroke-linecap="round"
    filter="url(#glow)" transform="rotate(-90 450 105)">
    <animate attributeName="stroke-dashoffset" values="276;0" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="stroke" values="#550000;#ff2200;#ff4400;#ff2200" dur="2.5s" repeatCount="indefinite" begin="1.8s"/>
  </circle>
  <text x="450" y="115" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="36" font-weight="bold" fill="#ffffff" filter="url(#strongGlow)" opacity="0">
    50
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;1" dur="2s" fill="freeze"/>
  </text>
  <text x="450" y="162" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="10" fill="#888888" letter-spacing="2">CURRENT STREAK</text>
  <text x="450" y="176" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="10" fill="#444444" letter-spacing="1">Jul 18</text>

  <!-- RIGHT — Longest Streak -->
  <text x="750" y="162" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="11" fill="#444444" letter-spacing="2">LONGEST STREAK</text>
  <text x="750" y="176" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="10" fill="#333333" letter-spacing="1">Jul 18</text>
  <text x="750" y="120" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="52" font-weight="bold" fill="#cccccc" opacity="0">
    50
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.3;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Top label -->
  <text x="450" y="24" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="10" fill="#222222" letter-spacing="4">◈  PHANTOM  STREAK  ◈</text>

</svg>
